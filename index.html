<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prime Pick</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
  <meta name="p:domain_verify" content="f9c75a26a8ba26b15113785a489028ed"/>
</head>

<body>

<header>
  <img src="primelogo.jpeg" alt="Prime Pick " class="logo"/>
  <h1>Prime Pick</h1>
  <div class="header-actions">
    <button id="adminBtn">Admin</button>
    <button id="themeToggle">Light Mode</button>
  </div>
</header>

<main class="container">
  <section id="products"></section>

  <section id="adminPanel" class="hidden">
    <h2>Admin Panel</h2>

    <input id="pass" type="password" placeholder="Admin Password"/>

    <div id="formBox" class="hidden">
      <input id="title" placeholder="Product Title" />
      <input id="price" type="number" step="0.01" min="0" placeholder="Price" />
      <input id="image" type="url" placeholder="Image URL" />
      <input id="link" type="url" placeholder="Buy Link" />
      <textarea id="desc" placeholder="Description"></textarea>

      <button id="addBtn">Add Product</button>
    </div>

    <p id="msg"></p>
  </section>
</main>

<div id="confirmModal" class="confirm-modal hidden">
  <div class="confirm-dialog">
    <h3>Confirm Delete</h3>
    <p id="confirmMessage">Are you sure you want to delete this product?</p>
    <div class="confirm-actions">
      <button id="confirmYes" class="confirm-yes">Yes, Delete</button>
      <button id="confirmNo" class="confirm-no">No, Keep It</button>
    </div>
  </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
